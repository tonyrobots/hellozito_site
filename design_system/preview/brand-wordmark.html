<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card" style="background:var(--bone)">
  <div class="label-eyebrow" style="margin-bottom:10px">Wordmark — HELLO carries the riot, ZITO overlaps below in ink</div>
  <h1 style="font-family:var(--font-display);font-weight:900;text-transform:uppercase;font-size:104px;line-height:.78;letter-spacing:-.015em;margin:0;color:var(--char)">
    <span style="color:var(--tomato)">H</span><span style="color:var(--cobalt)">E</span><span style="color:var(--flamingo)">L</span><span style="color:var(--tangerine)">L</span><span style="color:var(--teal)">O</span><span style="color:var(--marigold)">,</span><br>
    <span style="display:inline-block;margin-top:-0.16em;color:var(--char)">ZITO</span>
  </h1>
  <div style="font-family:var(--font-body);font-style:italic;font-size:14px;color:var(--umber);margin-top:10px">tomato · cobalt · flamingo · tangerine · teal — primaries in the mix, no period, lines overlap.</div>
  <div style="font-family:var(--font-pixel);font-size:10px;color:var(--silt);margin-top:14px;padding-top:10px;border-top:1px solid var(--rule);letter-spacing:.04em;text-transform:uppercase;line-height:1.5">
    Single-color fallback: "HELLO, ZITO" in char when surrounded by riot already.
  </div>
</div></body></html>
