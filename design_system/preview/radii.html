<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="label-eyebrow" style="margin-bottom:10px">Corner radii — sharp is the default</div>
  <div class="row" style="gap:24px">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:90px;height:54px;background:var(--paper-2);border:2px solid var(--ink);border-radius:0px"></div>
        <div style="font-family:var(--font-display);font-weight:700;font-size:13px;text-transform:uppercase">r-0</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)">sharp / default</div>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:90px;height:54px;background:var(--paper-2);border:2px solid var(--ink);border-radius:2px"></div>
        <div style="font-family:var(--font-display);font-weight:700;font-size:13px;text-transform:uppercase">r-1</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)">barely-there</div>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:90px;height:54px;background:var(--paper-2);border:2px solid var(--ink);border-radius:4px"></div>
        <div style="font-family:var(--font-display);font-weight:700;font-size:13px;text-transform:uppercase">r-2</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)">chips & tags</div>
      </div>
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:90px;height:54px;background:var(--paper-2);border:2px solid var(--ink);border-radius:999px"></div>
        <div style="font-family:var(--font-display);font-weight:700;font-size:13px;text-transform:uppercase">r-pill</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)">pill / lozenge</div>
      </div>
    
  </div>
</div></body></html>
